name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'chore/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: arc_service/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r arc_service/requirements.txt
          pip install ruff

      - name: Run tests
        run: |
          pytest -v arc_service/tests

      - name: Lint
        run: |
          ruff check arc_service --output-format=github
