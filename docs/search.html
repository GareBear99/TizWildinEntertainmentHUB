<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>TizWildin Ecosystem Search</title><meta name="description" content="Search the TizWildin / ARC public routes, repository files, extracted links, lists, plugin routes, and source-spine index."><link rel="canonical" href="https://garebear99.github.io/TizWildinEntertainmentHUB/search.html"><style>body{margin:0;background:#070914;color:#f3f6ff;font-family:Inter,system-ui,Arial,sans-serif}.wrap{max-width:1160px;margin:0 auto;padding:32px 18px}.hero,.card{border:1px solid #28304f;background:#11152a;border-radius:20px;padding:20px;margin:12px 0}input{width:100%;padding:15px;border-radius:14px;border:1px solid #35416e;background:#090d1d;color:#fff;font-size:18px}.row{border-top:1px solid #28304f;padding:14px 0}.tag{display:inline-block;background:#1a203b;color:#86efac;border-radius:999px;padding:3px 8px;font-size:12px;margin-right:6px}a{color:#8ea2ff}</style></head><body><main class="wrap"><section class="hero"><h1>TizWildin / ARC Ecosystem Search</h1><p>Static full-text search over public route pages, indexed repository files, and extracted source links.</p><input id="q" placeholder="Search FreeEQ8, ARC-Core, vocoder, README, LibHunt, source links..."><p id="stats"></p></section><section id="results" class="card"></section></main><script>let IDX=null;fetch('search-index.json').then(r=>r.json()).then(j=>{IDX=j;stats.textContent=`${j.documentCount} searchable records / ${j.tokenCount} tokens`;run();});function toks(s){return (s||'').toLowerCase().match(/[a-z0-9_+#.-]{2,}/g)||[]}function run(){if(!IDX)return;let ts=toks(q.value);let scores=new Map();if(!ts.length){IDX.documents.slice(0,30).forEach((d,i)=>scores.set(i,1));}else{for(const t of ts){for(const [tok,ids] of Object.entries(IDX.invertedIndex)){if(tok.includes(t)||t.includes(tok)){for(const id of ids)scores.set(id,(scores.get(id)||0)+1);}}}}let rows=[...scores.entries()].sort((a,b)=>b[1]-a[1]).slice(0,80).map(([i,s])=>[IDX.documents[i],s]);results.innerHTML=rows.map(([d,s])=>`<div class="row"><span class="tag">${d.kind}</span><span class="tag">score ${s}</span><h3><a href="${d.url}">${esc(d.title)}</a></h3><p>${esc(d.summary||'')}</p></div>`).join('')||'<p>No results yet.</p>'}function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}q.addEventListener('input',run)</script></body></html>
